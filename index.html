<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الامتحانات</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: 'Tajawal', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 {
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
  }
 .container {
    max-width: 600px;
    margin: auto;
    border: 2px solid #00ffff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px #00ffff;
  }
  select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #00ffff;
    background: #111;
    color: #00ffff;
    font-size: 16px;
    outline: none;
  }
  select:focus, button:hover {
    box-shadow: 0 0 10px #00ffff;
  }
  button {
    background: #00ffff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
 .question {
    background: #111;
    border: 1px solid #00ffff;
    border-radius: 10px;
    padding: 15px;
    margin: 15px 0;
    text-align: right;
  }
 .options button {
    display: block;
    width: 100%;
    margin: 5px 0;
    background: #222;
    color: #fff;
    border: 1px solid #444;
  }
 .options button.correct {
    background: #00ff88;
    color: #000;
  }
 .options button.wrong {
    background: #ff4444;
    color: #fff;
  }
  label {
    display: block;
    text-align: right;
    margin-top: 10px;
    color: #00ffff;
  }
</style>
</head>
<body>

<h1>مولد الامتحانات</h1>
<div class="container">
  <label>الصف</label>
  <select id="gradeSelect">
    <option value="">اختر الصف</option>
  </select>

  <label>المادة</label>
  <select id="subjectSelect" disabled>
    <option value="">اختر المادة</option>
  </select>

  <label>الدرس</label>
  <select id="chapterSelect" disabled>
    <option value="">اختر الدرس</option>
  </select>

  <button id="startBtn" disabled>ابدأ الامتحان</button>

  <div id="quizArea"></div>
</div>

<script>
const gradeSelect = document.getElementById('gradeSelect');
const subjectSelect = document.getElementById('subjectSelect');
const chapterSelect = document.getElementById('chapterSelect');
const startBtn = document.getElementById('startBtn');
const quizArea = document.getElementById('quizArea');

let allData = {};

// 1. قائمة الصفوف والمواد اللي الموقع هيبحث عن ملفاتها
const filesToLoad = [
  "رابعة-ابتدائي-رياضيات.json",
  "رابعة-ابتدائي-انجلش.json",
  "رابعة-ابتدائي-علوم.json",
  "رابعة-ابتدائي-دراسات.json",
  "خامسة-ابتدائي-رياضيات.json",
  "خامسة-ابتدائي-انجلش.json",
  "خامسة-ابتدائي-علوم.json",
  "خامسة-ابتدائي-دراسات.json",
  "سادسة-ابتدائي-رياضيات.json",
  "سادسة-ابتدائي-انجلش.json",
  "سادسة-ابتدائي-علوم.json",
  "سادسة-ابتدائي-دراسات.json",
  "تالتة-اعدادي-رياضيات.json",
  "تالتة-اعدادي-انجلش.json",
  "تالتة-اعدادي-علوم.json",
  "تالتة-اعدادي-دراسات.json",
  "اولى-ثانوي-عربي.json",
  "اولى-ثانوي-رياضيات.json",
  "اولى-ثانوي-انجلش.json",
  "اولى-ثانوي-علوم-متكامله.json",
  "اولى-ثانوي-تاريخ.json",
  "اولى-ثانوي-فلسفه.json"
];

// 2. تحميل كل الملفات الموجودة
async function loadFiles() {
  for (let file of filesToLoad) {
    try {
      let res = await fetch(file);
      if (res.ok) {
        let data = await res.json();
        let [grade, subject] = file.replace('.json', '').split('-').slice(0,2).join('-');
        subject = file.replace('.json', '').split('-').slice(1).join('-');

        let gradeName = file.split('-').slice(0,2).join(' ');
        let subjectName = file.replace('.json', '').split('-').slice(2).join(' ');

        if (!allData[gradeName]) allData[gradeName] = {};
        allData[gradeName][subjectName] = data;
      }
    } catch (e) {
      console.log(file + " مش موجود");
    }
  }
  fillGrades();
}

// 3. تعبئة قائمة الصفوف
function fillGrades() {
  gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
  Object.keys(allData).forEach(grade => {
    gradeSelect.innerHTML += `<option value="${grade}">${grade}</option>`;
  });
}

// 4. لما يختار صف
gradeSelect.addEventListener('change', () => {
  let grade = gradeSelect.value;
  subjectSelect.innerHTML = '<option value="">اختر المادة</option>';
  chapterSelect.innerHTML = '<option value="">اختر الدرس</option>';
  chapterSelect.disabled = true;
  startBtn.disabled = true;

  if (grade && allData[grade]) {
    subjectSelect.disabled = false;
    Object.keys(allData[grade]).forEach(subject => {
      subjectSelect.innerHTML += `<option value="${subject}">${subject}</option>`;
    });
  } else {
    subjectSelect.disabled = true;
  }
});

// 5. لما يختار مادة
subjectSelect.addEventListener('change', () => {
  let grade = gradeSelect.value;
  let subject = subjectSelect.value;
  chapterSelect.innerHTML = '<option value="">اختر الدرس</option>';

  if (subject && allData[grade][subject]) {
    chapterSelect.disabled = false;
    Object.keys(allData[grade][subject]).forEach(chapter => {
      chapterSelect.innerHTML += `<option value="${chapter}">${chapter}</option>`;
    });
    startBtn.disabled = false;
  } else {
    chapterSelect.disabled = true;
    startBtn.disabled = true;
  }
});

// 6. تشغيل الامتحان
startBtn.addEventListener('click', () => {
  let grade = gradeSelect.value;
  let subject = subjectSelect.value;
  let chapter = chapterSelect.value;
  let questions = allData[grade][subject][chapter];

  quizArea.innerHTML = '';
  let allQ = [];

  if (questions.mcq) allQ = allQ.concat(questions.mcq.map(q => ({type: 'mcq', q})));
  if (questions.tf) allQ = allQ.concat(questions.tf.map(q => ({type: 'tf', q})));
  if (questions.short) allQ = allQ.concat(questions.short.map(q => ({type: 'short', q})));

  allQ.sort(() => Math.random() - 0.5); // خلط الأسئلة

  allQ.slice(0, 10).forEach((item, i) => {
    let div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<p>${i+1}. ${item.q}</p>`;

    if (item.type === 'mcq' || item.type === 'tf') {
      div.innerHTML += `<div class="options"><button onclick="alert('جرب تاني')">اظهر الإجابة</button></div>`;
    }
    quizArea.appendChild(div);
  });
});

loadFiles();
</script>

</body>
</html>
