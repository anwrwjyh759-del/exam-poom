<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الامتحانات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    * { box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Tajawal', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 {
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    margin-bottom: 20px;
  }
 .container {
    max-width: 650px;
    margin: auto;
    border: 2px solid #00ffff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px #00ffff;
    background: #0a0a0a;
  }
  label {
    display: block;
    text-align: right;
    margin: 15px 0 5px;
    color: #00ffff;
    font-weight: bold;
  }
  select, button {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border-radius: 10px;
    border: 1px solid #00ffff;
    background: #111;
    color: #00ffff;
    font-size: 16px;
    outline: none;
    font-family: 'Tajawal', Arial, sans-serif;
  }
  select:focus {
    box-shadow: 0 0 10px #00ffff;
  }
  button {
    background: #00ffff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
  }
  button:hover:not(:disabled) {
    box-shadow: 0 0 15px #00ffff;
    transform: scale(1.02);
  }
  button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    border-color: #333;
  }
 .question {
    background: #111;
    border: 1px solid #00ffff;
    border-radius: 10px;
    padding: 15px;
    margin: 15px 0;
    text-align: right;
  }
 .options button {
    display: block;
    width: 100%;
    margin: 5px 0;
    background: #222;
    color: #fff;
    border: 1px solid #444;
  }
 .options button.correct {
    background: #00ff88;
    color: #000;
  }
 .options button.wrong {
    background: #ff4444;
    color: #fff;
  }
 .error {
    color: #ff4444;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>مولد الامتحانات</h1>
<div class="container">
  <label>اختر الصف</label>
  <select id="gradeSelect">
    <option value="">اختر الصف</option>
  </select>

  <label>اختر المادة</label>
  <select id="subjectSelect" disabled>
    <option value="">اختر المادة</option>
  </select>

  <label>اختر الدرس</label>
  <select id="chapterSelect" disabled>
    <option value="">اختر الدرس</option>
  </select>

  <button id="startBtn" disabled>ابدأ الامتحان</button>

  <div id="quizArea"></div>
</div>

<script>
const gradeSelect = document.getElementById('gradeSelect');
const subjectSelect = document.getElementById('subjectSelect');
const chapterSelect = document.getElementById('chapterSelect');
const startBtn = document.getElementById('startBtn');
const quizArea = document.getElementById('quizArea');

let allData = {};

// قائمة الملفات - مظبوطة على الأسماء اللي رفعتها
const filesToLoad = [
  "اولى ثانوي-انجلش.json",
  "اولى ثانوي-تاريخ.json",
  "اولى ثانوي-رياضيات.json",
  "اولى ثانوي-عربي.json",
  "اولى ثانوي-علوم متكامله.json",
  "اولى ثانوي-فلسفه.json",
  "اولى اعدادي-انجلش.json",
  "اولى اعدادي-دراسات.json",
  "اولى اعدادي-رياضيات.json",
  "اولى اعدادي-عربي.json",
  "اولى اعدادي-علوم.json",
  "تانيه اعدادي-رياضيات.json",
  "تانيه اعدادي-عربي.json",
  "تانيه الاعدادي-دراسات.json",
  "تانيه إعدادي-علوم.json",
  "تانيه اعدادي-انجلش.json",
  "تالته اعدادي-انجلش.json",
  "تالته اعدادي-دراسات.json",
  "تالته اعدادي-رياضيات.json",
  "تالته اعدادي-عربي.json",
  "تالته اعدادي-علوم.json",
  "رابعه ابتدائي-انجلش.json",
  "رابعه ابتدائي-دراسات.json",
  "رابعه ابتدائي-رياضيات.json",
  "رابعه ابتدائي-عربي.json",
  "رابعه ابتدائي-علوم.json",
  "خامسه ابتدائي-انجلش.json",
  "خامسه ابتدائي-دراسات.json",
  "خامسه ابتدائي-رياضيات.json",
  "خامسه ابتدائي-عربي.json",
  "خامسه ابتدائي-علوم.json",
  "سادسه ابتدائي-انجلش.json",
  "سادسه ابتدائي-دراسات.json",
  "سادسه ابتدائي-رياضيات.json",
  "سادسه ابتدائي-عربي.json",
  "سادسه ابتدائي-علوم.json",
  "تالته ابتدائي-انجلش.json",
  "تالته ابتدائي-رياضيات.json",
  "تالته ابتدائي-عربي.json",
  "تانيه ابتدائي-انجلش.json",
  "تانيه ابتدائي-رياضيات.json",
  "تانيه ابتدائي-عربي.json"
];

// تحميل الملفات
async function loadFiles() {
  let loadedCount = 0;
  for (let file of filesToLoad) {
    try {
      let res = await fetch(file);
      if (res.ok) {
        let data = await res.json();

        // استخراج اسم الصف والمادة من اسم الملف
        let parts = file.replace('.json', '').split('-');
        let grade = parts[0] + ' ' + parts[1];
        let subject = parts.slice(2).join(' ');

        if (!allData[grade]) allData[grade] = {};
        allData[grade][subject] = data;
        loadedCount++;
      }
    } catch (e) {
      console.log('لم يتم تحميل: ' + file);
    }
  }
  console.log('تم تحميل ' + loadedCount + ' ملف');
  fillGrades();
}

// تعبئة الصفوف
function fillGrades() {
  gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
  Object.keys(allData).forEach(grade => {
    gradeSelect.innerHTML += `<option value="${grade}">${grade}</option>`;
  });
}

// اختيار الصف
gradeSelect.addEventListener('change', () => {
  let grade = gradeSelect.value;
  subjectSelect.innerHTML = '<option value="">اختر المادة</option>';
  chapterSelect.innerHTML = '<option value="">اختر الدرس</option>';
  chapterSelect.disabled = true;
  startBtn.disabled = true;
  quizArea.innerHTML = '';

  if (grade && allData[grade]) {
    subjectSelect.disabled = false;
    Object.keys(allData[grade]).forEach(subject => {
      subjectSelect.innerHTML += `<option value="${subject}">${subject}</option>`;
    });
  } else {
    subjectSelect.disabled = true;
  }
});

// اختيار المادة
subjectSelect.addEventListener('change', () => {
  let grade = gradeSelect.value;
  let subject = subjectSelect.value;
  chapterSelect.innerHTML = '<option value="">اختر الدرس</option>';

  if (subject && allData[grade][subject]) {
    chapterSelect.disabled = false;
    Object.keys(allData[grade][subject]).forEach(chapter => {
      chapterSelect.innerHTML += `<option value="${chapter}">${chapter}</option>`;
    });
    startBtn.disabled = false;
  } else {
    chapterSelect.disabled = true;
    startBtn.disabled = true;
  }
});

// بدء الامتحان
startBtn.addEventListener('click', () => {
  let grade = gradeSelect.value;
  let subject = subjectSelect.value;
  let chapter = chapterSelect.value;

  if (!allData[grade] ||!allData[grade][subject] ||!allData[grade][subject][chapter]) {
    quizArea.innerHTML = '<p class="error">لا يوجد أسئلة في هذا الدرس</p>';
    return;
  }

  let questions = allData[grade][subject][chapter];
  quizArea.innerHTML = '';
  let allQ = [];

  if (questions.mcq) allQ = allQ.concat(questions.mcq.map(q => ({type: 'mcq', q})));
  if (questions.tf) allQ = allQ.concat(questions.tf.map(q => ({type: 'tf', q})));
  if (questions.short) allQ = allQ.concat(questions.short.map(q => ({type: 'short', q})));
  if (questions.long) allQ = allQ.concat(questions.long.map(q => ({type: 'long', q})));

  if (allQ.length === 0) {
    quizArea.innerHTML = '<p class="error">لا يوجد أسئلة في هذا الدرس</p>';
    return;
  }

  allQ.sort(() => Math.random() - 0.5);

  allQ.slice(0, 15).forEach((item, i) => {
    let div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<p><strong>${i+1}.</strong> ${item.q}</p>`;
    quizArea.appendChild(div);
  });
});

// ابدأ التحميل
loadFiles();
</script>

</body>
</html>
